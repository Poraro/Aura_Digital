<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Aura Digital</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --accent-hover: #1d4ed8; --text-main: #1e293b; --text-muted: #64748b; --light-bg: #f8fafc; --card-shadow: 0 15px 35px -5px rgba(15, 23, 42, 0.06); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { color: var(--text-main); background: var(--light-bg); line-height: 1.6; }
        header { background: var(--primary); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; white-space: nowrap; }
        nav ul { display: flex; list-style: none; gap: 0.5rem; flex-wrap: wrap; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; padding: 0.5rem 0.8rem; border-radius: 6px; transition: all 0.3s; }
        nav a:hover, nav a.active { color: white; background: rgba(255, 255, 255, 0.08); font-weight: 600; }
        .menu-toggle { display: none; flex-direction: column; gap: 6px; cursor: pointer; }
        .menu-toggle span { width: 24px; height: 2px; background: white; }
        
        main { min-height: 80vh; padding: 5rem 5%; max-width: 650px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 2.5rem; color: var(--primary); font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .section-desc { text-align: center; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 4rem; }
        form { background: white; padding: 3.5rem 3rem; border-radius: 16px; box-shadow: var(--card-shadow); border: 1px solid rgba(15, 23, 42, 0.02); display: flex; flex-direction: column; gap: 1.75rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea { width: 100%; padding: 0.85rem 1rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; color: var(--text-main); transition: border-color 0.2s; background: #f8fafc; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; }
        .btn-submit { background: var(--accent); color: white; font-weight: 600; padding: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; font-size: 1rem; margin-top: 0.5rem; box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
        .btn-submit:hover { background: var(--accent-hover); }
        
        footer { background: var(--primary); color: #94a3b8; padding: 3rem 5% 1rem; font-size: 0.9rem; margin-top: 6rem; text-align: center; }

        @media (max-width: 1100px) {
            .menu-toggle { display: flex; }
            nav ul { display: none; grid-template-columns: repeat(2, 1fr); width: 100%; position: absolute; top: 100%; left: 0; background: var(--primary); padding: 1.5rem; gap: 0.8rem; text-align: center; }
            nav ul.active { display: grid; }
            nav a { display: block; padding: 0.6rem; background: rgba(255,255,255,0.03); }
            .section-title { font-size: 2rem; }
            form { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Aura Digital</a>
        <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
        <nav><ul id="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Projects</a></li>
            <li><a href="team.html">Team</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="careers.html">Careers</a></li>
            <li><a href="testimonials.html">Reviews</a></li>
            <li><a href="faq.html">FAQs</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="privacy.html">Privacy</a></li>
            <li><a href="terms.html">Terms</a></li>
        </ul></nav>
    </header>

    <main>
        <h1 class="section-title">Connect With Us</h1>
        <p class="section-desc">Have an enterprise project in mind? Drop us a message below.</p>
        
        <form onsubmit="event.preventDefault(); alert('Message successfully transmitted to Aura Digital corporate servers!');">
            <div>
                <label>Full Name</label>
                <input type="text" required placeholder="John Doe">
            </div>
            <div>
                <label>Corporate Email</label>
                <input type="email" required placeholder="john@company.com">
            </div>
            <div>
                <label>Message Content</label>
                <textarea required rows="5" placeholder="Tell us briefly about your engineering requirements..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit Request</button>
        </form>
    </main>

    <footer><p>&copy; 2026 Aura Digital. All rights reserved.</p></footer>
    <script>
        document.getElementById('mobile-menu').addEventListener('click', () => { document.getElementById('nav-list').classList.toggle('active'); });
    </script>
</body>
</html>

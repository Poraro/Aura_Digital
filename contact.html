<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Aura Digital</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --text: #334155; --light: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { color: var(--text); background: var(--light); line-height: 1.6; }
        header { background: var(--primary); color: white; padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.3rem; font-weight: bold; color: white; text-decoration: none; white-space: nowrap; }
        nav ul { display: flex; list-style: none; gap: 0.8rem; flex-wrap: wrap; }
        nav a { color: #cbd5e1; text-decoration: none; font-size: 0.85rem; transition: color 0.3s; padding: 0.2rem 0.4rem; border-radius: 4px; }
        nav a:hover, nav a.active { color: white; background: rgba(255, 255, 255, 0.1); font-weight: 600; }
        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .menu-toggle span { width: 25px; height: 3px; background: white; }
        main { min-height: 80vh; padding: 4rem 5%; }
        footer { background: var(--primary); color: #94a3b8; padding: 3rem 5% 1rem; font-size: 0.9rem; margin-top: 4rem; }
        @media (max-width: 1100px) { .menu-toggle { display: flex; } nav ul { display: none; flex-direction: column; width: 100%; position: absolute; top: 100%; left: 0; background: var(--primary); padding: 2rem; gap: 1rem; text-align: center; } nav ul.active { display: flex; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Aura Digital</a>
        <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
        <nav><ul id="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Projects</a></li>
            <li><a href="team.html">Team</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="careers.html">Careers</a></li>
            <li><a href="testimonials.html">Reviews</a></li>
            <li><a href="faq.html">FAQs</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="privacy.html">Privacy</a></li>
            <li><a href="terms.html">Terms</a></li>
        </ul></nav>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">
        <h1 style="text-align: center; font-size: 2.5rem; color: #0f172a; margin-bottom: 1rem;">Connect With Us</h1>
        <p style="text-align: center; color: #64748b; margin-bottom: 3rem;">Have an enterprise project in mind? Drop us a message below.</p>
        
        <form onsubmit="event.preventDefault(); alert('Message successfully transmitted to Aura Digital corporate servers!');" style="background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Full Name</label>
                <input type="text" required style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Corporate Email</label>
                <input type="email" required style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Message Content</label>
                <textarea required rows="5" style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px; font-family: inherit;"></textarea>
            </div>
            <button type="submit" style="background: #2563eb; color: white; font-weight: bold; padding: 0.9rem; border: none; border-radius: 4px; cursor: pointer; transition: background 0.3s;">Submit Request</button>
        </form>
    </main>

    <footer><p style="text-align: center;">&copy; 2026 Aura Digital. All rights reserved.</p></footer>
    <script>
        document.getElementById('mobile-menu').addEventListener('click', () => { document.getElementById('nav-list').classList.toggle('active'); });
    </script>
</body>
</html>
